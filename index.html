<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Photo Showcase</title>
    <style>
        body { font-family: Arial, sans-serif; background: #121212; color: #ffffff; margin: 0; padding: 20px; }
        h1 { text-align: center; margin-bottom: 20px; letter-spacing: 2px; }
        .album-tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; }
        .tab-btn { background: #333; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; font-weight: bold; transition: 0.3s; text-transform: uppercase; }
        .tab-btn:hover { background: #555; }
        .tab-btn.active { background: #007bff; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        .photo-card { background: #1e1e1e; border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; }
        /* Using the display image makes it super fast */
        .photo-card img { width: 100%; height: 250px; object-fit: cover; transition: transform 0.3s ease; }
        .photo-card img:hover { transform: scale(1.05); }
        .actions { padding: 15px; display: flex; justify-content: space-between; align-items: center; background: #1e1e1e;}
        .filename { font-size: 0.85em; color: #aaaaaa; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 60%; }
        .download-btn { background: #007bff; color: white; padding: 8px 12px; text-decoration: none; border-radius: 4px; font-size: 0.85em; font-weight: bold;}
        .download-btn:hover { background: #0056b3; }
    </style>
</head>
<body>
    <h1>MY PHOTO SHOWCASE</h1>
    <div class="album-tabs" id="albumTabs"></div>
    <div class="gallery" id="gallery"></div>

    <script>
        // Add a random timestamp so the browser doesn't cache an old version of the gallery
        fetch('gallery.json?v=' + new Date().getTime())
            .then(response => response.json())
            .then(data => {
                const tabsDiv = document.getElementById('albumTabs');
                const galleryDiv = document.getElementById('gallery');
                const albums = Object.keys(data);
                
                if (albums.length === 0) {
                    galleryDiv.innerHTML = "<p style='text-align:center;'>No albums found yet!</p>";
                    return;
                }

                albums.forEach(album => {
                    const btn = document.createElement('button');
                    btn.className = 'tab-btn';
                    btn.innerText = album;
                    btn.onclick = () => loadAlbum(album);
                    tabsDiv.appendChild(btn);
                });

                window.loadAlbum = function(albumName) {
                    document.querySelectorAll('.tab-btn').forEach(btn => {
                        btn.classList.remove('active');
                        if (btn.innerText.toLowerCase() === albumName.toLowerCase()) btn.classList.add('active');
                    });

                    galleryDiv.innerHTML = '';
                    const photos = data[albumName];
                    photos.forEach(item => {
                        const card = document.createElement('div');
                        card.className = 'photo-card';
                        // Use item.display for viewing, but item.url for full quality downloading!
                        const displayImg = item.display ? item.display : item.url;
                        card.innerHTML = `
                            <a href="${item.url}" target="_blank">
                                <img src="${displayImg}" loading="lazy" alt="${item.filename}">
                            </a>
                            <div class="actions">
                                <span class="filename">${item.filename}</span>
                                <a href="${item.url}" target="_blank" class="download-btn" download="${item.filename}">Download Original</a>
                            </div>
                        `;
                        galleryDiv.appendChild(card);
                    });
                };

                loadAlbum(albums[0]);
            })
            .catch(error => console.log('No photos yet!', error));
    </script>
</body>
</html>
